services:
  mysql:
    image: ${MYSQL_IMAGE}
    container_name: crm-prod-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_prod_data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-33061}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - crm_network

  app:
    build:
      context: ../..
      dockerfile: infra/production/app/Dockerfile
      args:
        PHP_IMAGE: ${PHP_IMAGE}
        APP_USER: ${APP_USER}
        APP_GROUP: ${APP_GROUP}
        APP_UID: ${APP_UID}
        APP_GID: ${APP_GID}
    container_name: crm-prod-app
    restart: unless-stopped
    working_dir: /var/www/crm
    env_file:
      - ../../services/crm/.env
    environment:
      APP_ENV: ${APP_ENV}
      APP_DEBUG: ${APP_DEBUG}
      APP_URL: ${APP_URL}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE}
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ../../services/crm:/var/www/crm
      - crm_prod_vendor:/var/www/crm/vendor
      - crm_prod_storage:/var/www/crm/storage
      - crm_prod_bootstrap_cache:/var/www/crm/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 9000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - crm_network

  nginx:
    image: ${NGINX_IMAGE}
    container_name: crm-prod-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${NGINX_PORT:-8081}:80"
    volumes:
      - ../../services/crm:/var/www/crm:ro
      - crm_prod_vendor:/var/www/crm/vendor:ro
      - crm_prod_storage:/var/www/crm/storage:ro
      - crm_prod_bootstrap_cache:/var/www/crm/bootstrap/cache:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - crm_network

  cloudflared:
    image: ${CLOUDFLARED_IMAGE}
    container_name: crm-prod-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      nginx:
        condition: service_healthy
    networks:
      - crm_network

volumes:
  mysql_prod_data:
  crm_prod_vendor:
  crm_prod_storage:
  crm_prod_bootstrap_cache:

networks:
  crm_network:
    name: crm-prod-network
