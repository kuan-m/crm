name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  laravel-tests:
    runs-on: ubuntu-24.04

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: crm_testing
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - uses: actions/checkout@v4

    - name: Настройка PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: mbstring, dom, curl, libxml, mysql, zip, bcmath, intl, gd
        coverage: none

    - name: Установка зависимостей
      working-directory: services/crm
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Копирование .env
      working-directory: services/crm
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"

    - name: Генерация ключа
      working-directory: services/crm
      run: php artisan key:generate

    - name: Права доступа к директориям
      working-directory: services/crm
      run: chmod -R 777 storage bootstrap/cache

    - name: Проверка стиля кода (Pint)
      working-directory: services/crm
      run: ./vendor/bin/pint --test

    - name: Статический анализ (PHPStan)
      working-directory: services/crm
      run: ./vendor/bin/phpstan analyse --memory-limit=2G

    - name: Запуск миграций и сидов
      working-directory: services/crm
      env:
        DB_CONNECTION: mysql
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_DATABASE: crm_testing
        DB_USERNAME: root
        DB_PASSWORD: root
      run: php artisan migrate --seed --force

    - name: Выполнение тестов (юнит и функциональные) через PHPUnit
      working-directory: services/crm
      env:
        DB_CONNECTION: mysql
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_DATABASE: crm_testing
        DB_USERNAME: root
        DB_PASSWORD: root
      run: php artisan test